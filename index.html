<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная карта здания</title>
    <script src="https://unpkg.com/konva@9.3.15/konva.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <div class="header">
        <h2>Интерактивная карта БРИЭТ</h2>
    </div>

    <div class="floor-buttons">
        <button class="floor-button active" data-floor="1">1</button>
        <button class="floor-button" data-floor="2">2</button>
        <button class="floor-button" data-floor="3">3</button>
    </div>

    <div id="map-container"></div>

    <div id="room-modal" class="modal">
        <span class="close-button" id="modal-close">&times;</span>
        <h3 id="modal-title">Название кабинета</h3>
        <p id="modal-desc">Описание кабинета...</p>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>

</body>
</html>
